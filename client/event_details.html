<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Event Details - FixedHack</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      margin: 0;
      padding: 0;
    }
    .container {
      max-width: 900px;
      margin: 40px auto;
      background: white;
      border-radius: 12px;
      padding: 30px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    h1 { margin-top: 0; }
    .meta {
      color: #666;
      margin-bottom: 20px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
      margin: 20px 0;
    }
    .box {
      background: #f2f4ff;
      padding: 12px;
      border-radius: 8px;
    }
    .btn {
      padding: 12px 22px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
    }
    .primary { background: #5b63ff; color: white; }
    .secondary { background: #999; color: white; }
  </style>
</head>
<body>

<div class="container">
  <h1 id="title">Loading...</h1>
  <div class="meta" id="org-date">Loading...</div>

  <div class="grid">
    <div class="box">📍 <span id="location"></span></div>
    <div class="box">⏱ <span id="duration"></span></div>
    <div class="box">🏆 <span id="prize"></span></div>
    <div class="box">👥 <span id="participants"></span></div>
  </div>

  <p id="description"></p>

  <br>
  <button id="regBtn" class="btn primary" onclick="toggleRegister()">Register</button>
</div>

<script>
const API_BASE = "http://localhost:5000/api";
const token = localStorage.getItem("studentToken");
const params = new URLSearchParams(window.location.search);
const eventId = params.get("id");

if (!token) {
  alert("Please log in first");
  window.location.href = "studentlogin.html";
}

let currentlyRegistered = false;

async function loadEvent() {
  const res = await fetch(`${API_BASE}/events/${eventId}`);
  const event = await res.json();

  document.getElementById("title").textContent = event.title;
  document.getElementById("org-date").textContent = event.organizer + " • " + event.date;
  document.getElementById("location").textContent = event.location;
  document.getElementById("duration").textContent = event.duration;
  document.getElementById("prize").textContent = event.prize;
  document.getElementById("participants").textContent = event.participants;
  document.getElementById("description").textContent = event.description;

  // Demo rule: assume registered if count > 0
  currentlyRegistered = event.registrations > 0;
  updateButton();
}

function updateButton() {
  const btn = document.getElementById("regBtn");
  if (currentlyRegistered) {
    btn.textContent = "Registered";
    btn.className = "btn secondary";
  } else {
    btn.textContent = "Register";
    btn.className = "btn primary";
  }
}

async function toggleRegister() {
  if (!currentlyRegistered) {
    const res = await fetch(`${API_BASE}/events/${eventId}/register`, {
      method: "POST",
      headers: { Authorization: `Bearer ${token}` }
    });

    if (!res.ok) {
      alert("Already registered or error");
      return;
    }

    currentlyRegistered = true;
    alert("Registered successfully!");

  } else {
    const res = await fetch(`${API_BASE}/events/${eventId}/register`, {
      method: "DELETE",
      headers: { Authorization: `Bearer ${token}` }
    });

    if (!res.ok) {
      alert("Error while unregistering");
      return;
    }

    currentlyRegistered = false;
    alert("Unregistered successfully!");
  }

  updateButton();
}

loadEvent();
</script>

</body>
</html>
